<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>加载中 - 临时邮箱</title>
    <link rel="icon" href="/favicon-mail-clock.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon-mail-clock.svg" type="image/svg+xml" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Manrope", "SF Pro Display", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(197, 160, 89, 0.16), transparent 24%),
          radial-gradient(circle at top right, rgba(221, 183, 143, 0.1), transparent 22%),
          linear-gradient(180deg, #fbfaf7 0%, #f7f3eb 100%);
        min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #221d18; position: relative; overflow-x: hidden;
      }
      body::before {
        content: ''; position: fixed; inset: 0;
        background:
          radial-gradient(circle at bottom left, rgba(130, 112, 83, 0.1), transparent 22%),
          linear-gradient(rgba(60, 46, 28, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(60, 46, 28, 0.02) 1px, transparent 1px);
        background-size: auto, 32px 32px, 32px 32px;
        z-index: -1;
      }
      footer{ position: fixed; bottom: 10px; left: 0; right: 0; text-align: center; color: #93897b; font-size: 11px; opacity: .9; pointer-events: none; letter-spacing: .12em; text-transform: uppercase; }
      .loading-container { text-align: center; padding: 36px 34px; background: rgba(255, 255, 255, 0.86); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border-radius: 34px; border: 1px solid rgba(70, 54, 36, 0.1); box-shadow: 0 28px 62px rgba(74, 52, 22, 0.1); position: relative; z-index: 1; min-width: min(92vw, 420px); }
      .loading-container::before { content: ''; position: absolute; inset: 0 0 auto 0; height: 4px; border-radius: 34px 34px 0 0; background: linear-gradient(90deg, rgba(197,160,89,.95), rgba(208,112,169,.75)); }
      .logo { width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 18px; display: grid; place-items: center; background: #201b17; box-shadow: 0 18px 30px rgba(44, 31, 15, 0.2); color: #c5a059; font-family: "IBM Plex Mono", monospace; font-size: 13px; font-weight: 600; letter-spacing: .18em; text-indent: .18em; }
      .title { font-family: "Playfair Display", serif; font-size: 2.9rem; line-height: .95; margin-bottom: 12px; font-weight: 700; letter-spacing: -.04em; color: #221d18; }
      .spinner { width: 34px; height: 34px; border: 3px solid rgba(197, 160, 89, 0.18); border-top: 3px solid #c5a059; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 14px; }
      .status { font-size: 0.92rem; color: #746a5d; margin-bottom: 10px; font-weight: 600; }
      .progress { width: min(220px, 100%); height: 6px; background: rgba(197, 160, 89, 0.1); border-radius: 999px; margin: 0 auto; overflow: hidden; }
      .progress-bar { height: 100%; background: linear-gradient(90deg, #c5a059, #1f1c18); border-radius: 999px; animation: progress 2s ease-in-out infinite; }
      @keyframes spin { to { transform: rotate(360deg);} }
      @keyframes progress { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
    </style>
  </head>
  <body>
    <div class="loading-container">
      <div class="logo">FM</div>
      <h1 class="title">Freemail</h1>
      <div class="spinner"></div>
      <div class="status">请稍候...</div>
      <div class="progress"><div class="progress-bar"></div></div>
    </div>
    <div id="footer-slot"></div>
    <script src="/js/auth-guard.js" data-autorun="loading"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // 根据 URL 查询参数自定义状态文案：?status=...
        try {
          const u = new URL(location.href);
          const s = (u.searchParams.get('status') || '').trim();
          if (s) {
            const el = document.querySelector('.status');
            if (el) el.textContent = s;
          }
        } catch(_){ }
        (async function(){
          try{
            const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
            const html = await res.text();
            const slot = document.getElementById('footer-slot');
            if (slot){ slot.outerHTML = html; setTimeout(()=>{ const y=document.getElementById('footer-year'); if (y) y.textContent = new Date().getFullYear(); },0); }
          }catch(_){ }
        })();
        // 预加载首页关键资源（模板和脚本），认证后可无缝切换
        try{ fetch('/templates/app.html', { cache: 'force-cache' }); }catch(_){ }
        try{
          const link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'script';
          link.href = '/js/app.js';
          document.head.appendChild(link);
        }catch(_){ }
        // 已认证用户兜底重定向：检测 Cookie 则确保跳往目标（更短延时）
        try{
          var hasToken = document.cookie.split(';').some(function(c){ return c.trim().indexOf('iding-session=') === 0; });
          if (hasToken){
            var target = (function(){ try{ var u=new URL(location.href); return u.searchParams.get('redirect')||'/'; }catch(_){ return '/'; }})();
            // 减少延时时间
            setTimeout(function(){ try{ location.replace(target); }catch(_){ location.replace('/'); } }, 100);
          }
        }catch(_){ }
      });
    </script>
  </body>
</html>
